services:
  mongodb-primary:
    image: mongo:7.0
    container_name: afs-mongodb-primary
    command: >
      mongod
      --replSet Iax-Bintulu
      --bind_ip_all
      --keyFile /etc/mongo-keyfile/keyfile
    ports:
      - "27017:27017"
    volumes:
      - mongodb_primary_data:/data/db
      - ./mongo-keyfile/keyfile:/etc/mongo-keyfile/keyfile:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: afs_secure_pass_2026
      MONGO_INITDB_DATABASE: afs_db
    networks:
      - afs-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongo-setup:
    image: mongo:7.0
    container_name: mongo-setup
    networks:
      - afs-network
    depends_on:
      mongodb-primary:
        condition: service_healthy
    entrypoint:
      - bash
      - -c
      - |
        echo "Waiting for MongoDB primary..."
        sleep 10

        mongosh mongodb-primary:27017 \
          -u admin \
          -p afs_secure_pass_2026 \
          --authenticationDatabase admin \
          --eval "rs.initiate({
            _id: 'Iax-Bintulu',
            members: [
              { _id: 0, host: 'mongodb-primary:27017', priority: 1 }
            ]
          })"

        echo "Replica set initialized successfully"

  # AFS Engine (Go Application)
  afs-engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: iaxrazali/afs-engine:latest
    container_name: afs-engine
    environment:
      MONGO_URI: mongodb://admin:afs_secure_pass_2026@mongodb-primary:27017/?replicaSet=Iax-Bintulu&authSource=admin
      MONGO_DATABASE: afs_db
      MONGO_REFERENCE_DATABASE: master_reference

      API_ENDPOINT: http://localhost:8081/flight-data-entry/bulkScheduleSitaFlights
      API_TIMEOUT: 30s
      RETRY_ATTEMPTS: 3
      RETRY_DELAY_MS: 60s

      CRON_SCHEDULE: "15 0 * * *"

      BATCH_SIZE: 100
      MAX_WORKERS: 4

      AFS_TTL_DAYS: 7
      ENABLE_XML_ARCHIVE: "true"
      ARCHIVE_PATH: /app/archive

      LOG_LEVEL: info
      LOG_PATH: /app/logs

      NODE_ENV: production
      PORT: 3000
      TZ: Asia/Kuala_Lumpur
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs
      - ./archive:/app/archive
    networks:
      - afs-network
    depends_on:
      mongo-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # Mock API Receiver
  api-receiver:
    build:
      context: ./mock-api
      dockerfile: Dockerfile
    image: iaxrazali/api-receiver:latest
    container_name: api-receiver
    environment:
      PORT: 3001
      DOWNLOADS_DIR: /app/downloads
    ports:
      - "3001:3001"
    volumes:
      - ~/Downloads/fidasm-received:/app/downloads
    networks:
      - afs-network
    restart: unless-stopped

  # Mongo Express (Web UI)
  mongo-express:
    image: mongo-express:latest
    container_name: afs-mongo-express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: afs_secure_pass_2026
      ME_CONFIG_MONGODB_URL: mongodb://admin:afs_secure_pass_2026@mongodb-primary:27017/?replicaSet=Iax-Bintulu&authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    ports:
      - "8081:8081"
    networks:
      - afs-network
    depends_on:
      - mongodb-primary
    restart: unless-stopped

networks:
  afs-network:
    name: afs-network
    driver: bridge

volumes:
  mongodb_primary_data: